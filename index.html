<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0, user-scalable=yes, viewport-fit=cover">
    <title>Keuangan Pro - Zoom 2 Jari & Teks Besar</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            min-height: 100%;
            background: #f4f6fa;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            color: #1e293b;
            /* Zoom 2 jari diaktifkan via meta viewport user-scalable=yes */
        }

        /* Kontainer utama tidak pakai transform scale lagi, biar native zoom berfungsi */
        .app-container {
            max-width: 100%;
            width: 100%;
            background: #ffffff;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.05);
            min-height: 100vh;
        }

        /* Header lebih besar */
        .app-header {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            padding: 26px 16px;
            text-align: center;
            font-weight: 800;
            font-size: 1.9rem;
            letter-spacing: -0.3px;
            flex-shrink: 0;
        }

        /* Nav tabs lebih besar */
        .nav-tabs {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            background: #ffffff;
            border-bottom: 2px solid #e9eef3;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            z-index: 100;
            background: white;
        }

        .nav-btn {
            background: none;
            border: none;
            padding: 18px 5px;
            font-size: 15px;
            font-weight: 800;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s;
        }

        .nav-btn.active {
            color: #7c3aed;
            border-bottom: 3px solid #7c3aed;
            background: #faf5ff;
        }

        .screen {
            display: none;
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 100px;
        }

        .screen.active {
            display: block;
        }

        /* Tabel dengan font lebih besar */
        .table-container {
            overflow-x: auto;
            border-radius: 24px;
            border: 1px solid #e2e8f0;
            background: white;
            margin-top: 12px;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 16px;
            min-width: 750px;
        }

        .data-table th {
            background: #f1f5f9;
            padding: 18px 12px;
            text-align: left;
            font-weight: 800;
            font-size: 15px;
            color: #0f172a;
            border-bottom: 2px solid #e2e8f0;
        }

        .data-table td {
            padding: 18px 12px;
            border-bottom: 1px solid #f0f2f5;
            vertical-align: middle;
            font-size: 15px;
        }

        /* Nominal dan sisa lebih besar */
        .data-table td:nth-child(3),
        .data-table td:nth-child(4) {
            font-size: 16px;
            font-weight: 700;
        }

        .summary-val {
            font-size: 36px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .badge-lunas {
            background: #d1fae5;
            color: #065f46;
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 13px;
            display: inline-block;
        }

        .btn-small {
            background: #7c3aed;
            border: none;
            color: white;
            padding: 10px 18px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            margin-right: 8px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        
        .btn-small-outline {
            background: #f1f5f9;
            color: #b91c1c;
            border: none;
            padding: 10px 18px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
        }
        
        .hist-mini {
            background: #f8fafc;
            padding: 10px;
            border-radius: 16px;
            font-size: 13px;
            max-width: 300px;
            white-space: normal;
            border-left: 4px solid #10b981;
            line-height: 1.5;
        }
        
        .summary-box {
            background: linear-gradient(115deg, #7c3aed 0%, #a855f7 100%);
            color: white;
            padding: 28px 18px;
            border-radius: 32px;
            margin-bottom: 24px;
            text-align: center;
        }
        
        .search-input {
            width: 100%;
            padding: 18px 22px;
            border: 1.5px solid #e2e8f0;
            border-radius: 50px;
            margin-bottom: 20px;
            font-size: 16px;
            background: #f8fafc;
        }
        
        /* Form lebih besar */
        .form-group { margin-bottom: 26px; }
        .form-label { display: block; font-size: 16px; font-weight: 800; margin-bottom: 10px; color: #1e293b; }
        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 20px;
            font-size: 16px;
            font-family: inherit;
        }
        
        .btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 800;
            background: #7c3aed;
            color: white;
            cursor: pointer;
            margin-bottom: 12px;
        }
        
        /* Modal */
        #payModal, #restoreModal, #monthModal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }
        .modal-body {
            background: white;
            padding: 28px;
            border-radius: 36px;
            width: 100%;
            max-width: 420px;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-body h3 { font-size: 1.7rem; margin-bottom: 16px; }
        
        /* Riwayat bulanan */
        .month-list { display: flex; flex-direction: column; gap: 18px; }
        .month-item { background: #ffffff; border-radius: 32px; padding: 22px; border: 1px solid #eef2ff; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
        .month-title { font-size: 1.4rem; font-weight: 800; display: flex; justify-content: space-between; margin-bottom: 14px; }
        .month-stats-grid { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 14px; }
        .stat-chip { background: #f1f5f9; padding: 8px 18px; border-radius: 40px; font-size: 14px; font-weight: 700; }
        .filter-chip { background: white; border: 1px solid #cbd5e1; padding: 10px 22px; border-radius: 40px; font-size: 14px; font-weight: 700; cursor: pointer; }
        .filter-chip.active-filter { background: #7c3aed; border-color: #7c3aed; color: white; }
        .history-detail-item { border-bottom: 1px solid #f0f2f5; padding: 18px 0; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 8px; }
        .history-detail-item div { font-size: 14px; }
        
        /* Warna status */
        .status-lunas { color: #10b981; font-weight: 800; font-size: 16px; }
        .status-terlambat { color: #dc2626; font-weight: 800; font-size: 16px; }
        .status-normal { color: #1e293b; font-weight: 800; font-size: 16px; }
        
        /* Informasi zoom (opsional) */
        .zoom-info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 12px;
            z-index: 3000;
            pointer-events: none;
            font-weight: 500;
        }
        
        @media (max-width: 480px) {
            .data-table td, .data-table th { padding: 14px 10px; }
            .btn-small, .btn-small-outline { padding: 8px 14px; font-size: 13px; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="app-header">💰 KEUANGAN PRO</div>
    <div class="nav-tabs">
        <button class="nav-btn active" onclick="go('add', this)">TAMBAH</button>
        <button class="nav-btn" onclick="go('h', this)">AMANAH</button>
        <button class="nav-btn" onclick="go('p', this)">BERI AMANAH</button>
        <button class="nav-btn" onclick="go('st', this)">SETTING</button>
    </div>

    <div id="add" class="screen active">
        <form id="fForm">
            <div class="form-group"><label class="form-label">📌 Jenis</label>
                <select id="jns" class="form-select">
                    <option value="h">Amanah (saya menerima amanah)</option>
                    <option value="p">Beri Amanah (saya memberi amanah)</option>
                </select>
            </div>
            <div class="form-group"><label class="form-label">📅 Tanggal Transaksi</label><input type="date" id="tgl" class="form-input" required></div>
            <div class="form-group"><label class="form-label">⏰ Jatuh Tempo</label><input type="date" id="tmp" class="form-input"></div>
            <div class="form-group"><label class="form-label">💰 Nominal (Rp)</label><input type="number" id="nom" class="form-input" required placeholder="0"></div>
            <div class="form-group"><label class="form-label">📝 Nama / Keterangan</label><textarea id="ket" class="form-textarea" rows="2" required placeholder="Contoh: Amanah dari Andi untuk modal"></textarea></div>
            <button type="submit" class="btn">💾 SIMPAN DATA</button>
        </form>
    </div>

    <div id="h" class="screen">
        <div class="summary-box"><p>💸 TOTAL SISA AMANAH</p><div class="summary-val" id="totH">Rp 0</div></div>
        <input type="text" class="search-input" placeholder="🔍 Cari Nama/Keterangan..." onkeyup="filterTable('h', this.value)">
        <div class="table-container" id="tableHContainer"></div>
    </div>

    <div id="p" class="screen">
        <div class="summary-box" style="background:linear-gradient(115deg, #059669 0%, #10b981 100%);"><p>📈 TOTAL SISA BERI AMANAH</p><div class="summary-val" id="totP">Rp 0</div></div>
        <input type="text" class="search-input" placeholder="🔍 Cari Nama/Keterangan..." onkeyup="filterTable('p', this.value)">
        <div class="table-container" id="tablePContainer"></div>
    </div>

    <div id="st" class="screen">
        <div class="card" style="text-align:center; background: #fefce8; border-radius:32px; padding:24px; margin-bottom:24px;">
            <h3 style="margin-bottom:16px; font-size:1.5rem;">📋 Backup & Restore</h3>
            <div style="display:flex; gap:12px; flex-wrap:wrap; justify-content:center;">
                <button onclick="simpleBackup()" class="btn" style="background:#3b82f6; margin:0; width:auto; padding:12px 28px;">📋 SALIN DATA</button>
                <button onclick="openRestoreModal()" class="btn btn-outline" style="margin:0; width:auto; padding:12px 28px; background:transparent; border:2px solid #7c3aed; color:#7c3aed;">📥 RESTORE</button>
            </div>
        </div>
        <div class="card" style="border-radius:32px; padding:20px; background:white;">
            <h3 style="margin-bottom:20px; font-size:1.5rem;">📆 Riwayat Bulanan</h3>
            <div class="history-search-area" style="margin-bottom:20px;">
                <input type="text" id="monthSearchInput" class="search-input" placeholder="🔍 Cari nama / keterangan..." onkeyup="filterMonthlyHistory()">
                <div class="filter-group" style="display:flex; gap:12px; flex-wrap:wrap; margin-top:12px;">
                    <span class="filter-chip active-filter" data-filter="all">Semua</span>
                    <span class="filter-chip" data-filter="hutang">Amanah</span>
                    <span class="filter-chip" data-filter="piutang">Beri Amanah</span>
                </div>
                <div style="display:flex; justify-content:flex-end; margin-top:12px;">
                    <button class="reset-search-btn" onclick="resetMonthlyFilters()" style="background:#e2e8f0; border:none; border-radius:40px; padding:10px 20px; font-weight:700;">Reset Filter</button>
                </div>
                <div id="searchStats" class="search-stats" style="font-size:14px; margin-top:12px; text-align:center;"></div>
            </div>
            <div id="monthlyHistory" class="month-list"></div>
        </div>
    </div>
</div>

<!-- Informasi zoom (hanya pemberitahuan) -->
<div class="zoom-info">🔍 Gunakan 2 jari (pinch) untuk zoom</div>

<div id="payModal"><div class="modal-body"><h3>💵 Catat Pembayaran</h3><div id="sisaInfo" style="margin:15px 0; font-size:1.2rem; font-weight:bold;"></div><div class="form-group"><label>Tanggal Bayar</label><input type="date" id="pTgl" class="form-input" required></div><div class="form-group"><label>Nominal (Rp)</label><input type="number" id="pNom" class="form-input" required></div><div class="form-group"><label>Keterangan</label><input type="text" id="pKet" class="form-input" value="Tunai/Transfer"></div><button class="btn btn-success" onclick="savePay()" style="background:#10b981;">✅ SIMPAN BAYAR</button><button class="btn" onclick="closePay()" style="background:#cbd5e1; color:#1e293b;">BATAL</button></div></div>
<div id="restoreModal"><div class="modal-body"><h3>📋 Pulihkan Data</h3><textarea id="restoreTextarea" class="form-textarea" rows="4" placeholder='[{"id":123,"j":"h", ...}]'></textarea><button class="btn btn-success" onclick="executeRestore()" style="background:#10b981;">🔄 PULIHKAN</button><button class="btn" onclick="closeRestoreModal()" style="background:#cbd5e1;">TUTUP</button></div></div>
<div id="monthModal"><div class="modal-body"><h3 id="monthModalTitle" style="font-size:1.6rem;"></h3><div id="monthDetailContent" style="max-height:60vh; overflow-y:auto;"></div><button class="btn" onclick="closeMonthModal()" style="margin-top:20px;">Tutup</button></div></div>

<script>
    // ========== ZOOM 2 JARI: sudah diaktifkan via meta viewport user-scalable=yes, maximum-scale=3.0 ==========
    // Tidak perlu manipulasi transform lagi, biar native pinch zoom berfungsi.
    // Tampilan font sudah diperbesar semua.
    
    // DATA CORE
    const DB_KEY = 'keuangan_pro_v3';
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('tgl').value = today;
    const bulanIndo = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
    let currentPayId = null, currentSisa = 0, allRawMonthlyData = [];
    
    function getData() { return JSON.parse(localStorage.getItem(DB_KEY)) || []; }
    function saveData(db) { localStorage.setItem(DB_KEY, JSON.stringify(db)); }
    
    function formatTanggalIndonesia(dateStr) {
        if(!dateStr || dateStr === '-') return '-';
        const parts = dateStr.split('-');
        return parts.length===3 ? `${parts[2]}-${parts[1]}-${parts[0]}` : dateStr;
    }
    
    function getStatusColorClass(item) {
        const sisa = item.n - item.b;
        if(sisa === 0) return 'status-lunas';
        if(item.tm && item.tm !== '-' && new Date(item.tm) < new Date(today)) return 'status-terlambat';
        return 'status-normal';
    }
    
    function sortByNewest(items) { return [...items].sort((a,b)=>b.id - a.id); }
    
    function formatHistoryHtml(hist) {
        if(!hist || !hist.length) return '<div class="hist-mini" style="background:#fef9e3;">📭 Belum ada pembayaran</div>';
        let html = '<div class="hist-mini">';
        hist.forEach(r => { html += `<div>📅 ${formatTanggalIndonesia(r.t)} &nbsp; Rp ${r.n.toLocaleString()} &nbsp; (${escapeHtml(r.k)})</div>`; });
        html += '</div>';
        return html;
    }
    
    function renderTable(type) {
        const db = getData();
        let items = db.filter(i=>i.j===type);
        items = sortByNewest(items);
        const container = document.getElementById(type==='h'?'tableHContainer':'tablePContainer');
        let totalSisa = 0;
        if(!items.length){ 
            container.innerHTML = `<div style="padding:50px; text-align:center; font-size:16px;">✨ Tidak ada data ${type==='h'?'Amanah':'Beri Amanah'}</div>`; 
            document.getElementById(type==='h'?'totH':'totP').innerHTML='Rp 0'; 
            return; 
        }
        let html = `<table class="data-table"><thead>运转<th>Tanggal</th><th>Nama / Keterangan</th><th>Nominal Awal</th><th>Sisa Tagihan</th><th>Jatuh Tempo</th><th>Riwayat Bayar</th><th>Aksi</th></tr></thead><tbody>`;
        items.forEach(item=>{
            const sisa = item.n - item.b;
            totalSisa += sisa;
            const due = item.tm === '-' ? '-' : formatTanggalIndonesia(item.tm);
            const tgl = formatTanggalIndonesia(item.t);
            const histHtml = formatHistoryHtml(item.r);
            const color = getStatusColorClass(item);
            const lunasBadge = sisa===0 ? ' <span class="badge-lunas">✓ LUNAS</span>' : '';
            html += `<tr>
                <td style="font-size:15px;">${escapeHtml(tgl)}</td>
                <td><span class="${color}">${escapeHtml(item.k)}${lunasBadge}</span></td>
                <td style="font-weight:800; font-size:16px;">Rp ${item.n.toLocaleString()}</td>
                <td style="font-weight:800; font-size:16px; color:#4f46e5;">Rp ${sisa.toLocaleString()}</td>
                <td style="font-size:15px;">${due}</td>
                <td>${histHtml}</td>
                <td>${sisa>0 ? `<button class="btn-small" onclick="openPay(${item.id},${sisa})">💸 Bayar</button>` : `<span class="badge-lunas">✅ LUNAS</span>`}<button class="btn-small-outline" onclick="deleteItem(${item.id})">🗑 Hapus</button></td>
            </tr>`;
        });
        html += `</tbody>　　`;
        container.innerHTML = html;
        document.getElementById(type==='h'?'totH':'totP').innerHTML = 'Rp ' + totalSisa.toLocaleString();
    }
    
    function filterTable(type, keyword) {
        const db = getData();
        let items = db.filter(i=>i.j===type && i.k.toLowerCase().includes(keyword.toLowerCase()));
        items = sortByNewest(items);
        const container = document.getElementById(type==='h'?'tableHContainer':'tablePContainer');
        let totalSisa = 0;
        if(!items.length){ 
            container.innerHTML = `<div style="padding:50px; text-align:center; font-size:16px;">🔍 Tidak ada hasil</div>`; 
            document.getElementById(type==='h'?'totH':'totP').innerHTML='Rp 0'; 
            return; 
        }
        let html = `<table class="data-table"><thead><tr><th>Tanggal</th><th>Nama</th><th>Nominal Awal</th><th>Sisa</th><th>Jatuh Tempo</th><th>Riwayat</th><th>Aksi</th></tr></thead><tbody>`;
        items.forEach(item=>{
            const sisa = item.n - item.b;
            totalSisa += sisa;
            const due = item.tm === '-' ? '-' : formatTanggalIndonesia(item.tm);
            const tgl = formatTanggalIndonesia(item.t);
            const histHtml = formatHistoryHtml(item.r);
            const color = getStatusColorClass(item);
            const lunasBadge = sisa===0 ? ' <span class="badge-lunas">✓ LUNAS</span>' : '';
            html += `<tr>
                <td>${escapeHtml(tgl)}</td>
                <td><span class="${color}">${escapeHtml(item.k)}${lunasBadge}</span></td>
                <td style="font-weight:800;">Rp ${item.n.toLocaleString()}</td>
                <td style="font-weight:800;">Rp ${sisa.toLocaleString()}</td>
                <td>${due}</td>
                <td>${histHtml}</td>
                <td>${sisa>0 ? `<button class="btn-small" onclick="openPay(${item.id},${sisa})">Bayar</button>` : `<span class="badge-lunas">LUNAS</span>`}<button class="btn-small-outline" onclick="deleteItem(${item.id})">Hapus</button></td>
            </tr>`;
        });
        html += `</tbody> table`;
        container.innerHTML = html;
        document.getElementById(type==='h'?'totH':'totP').innerHTML = 'Rp ' + totalSisa.toLocaleString();
    }
    
    function escapeHtml(str){ if(!str) return ''; return str.replace(/[&<>]/g, m => m==='&'?'&amp;': m==='<'?'&lt;':'&gt;'); }
    
    document.getElementById('fForm').addEventListener('submit', (e)=>{
        e.preventDefault();
        const db = getData();
        const newItem = {
            id: Date.now(),
            j: document.getElementById('jns').value,
            t: document.getElementById('tgl').value,
            tm: document.getElementById('tmp').value || '-',
            n: parseFloat(document.getElementById('nom').value),
            b: 0, r: [],
            k: document.getElementById('ket').value.trim()
        };
        if(isNaN(newItem.n) || newItem.n<=0) return alert("Nominal harus lebih dari 0");
        if(!newItem.k) return alert("Nama / keterangan wajib diisi");
        db.push(newItem);
        saveData(db);
        alert("✅ Data tersimpan!");
        e.target.reset(); document.getElementById('tgl').value = today;
        renderTable(newItem.j);
        go(newItem.j, document.querySelector(`.nav-btn[onclick*="'${newItem.j}'"]`));
    });
    
    function openPay(id, sisa){ currentPayId=id; currentSisa=sisa; document.getElementById('pTgl').value=today; document.getElementById('pNom').value=''; document.getElementById('pKet').value='Tunai/Transfer'; document.getElementById('sisaInfo').innerHTML=`💰 Sisa: Rp ${sisa.toLocaleString()}`; document.getElementById('payModal').style.display='flex'; }
    function closePay(){ document.getElementById('payModal').style.display='none'; }
    function savePay(){
        const nominal = parseFloat(document.getElementById('pNom').value);
        if(isNaN(nominal)||nominal<=0) return alert("Masukkan nominal valid");
        if(nominal > currentSisa) return alert(`Nominal melebihi sisa (Rp ${currentSisa.toLocaleString()})`);
        const tglBayar = document.getElementById('pTgl').value;
        if(!tglBayar) return alert("Tanggal bayar harus diisi");
        const ketBayar = document.getElementById('pKet').value.trim() || "Pembayaran";
        const db = getData();
        const idx = db.findIndex(i=>i.id===currentPayId);
        if(idx===-1) return alert("Data tidak ditemukan");
        db[idx].b += nominal;
        if(!db[idx].r) db[idx].r=[];
        db[idx].r.push({ t: tglBayar, n: nominal, k: ketBayar });
        saveData(db);
        closePay();
        const active = document.querySelector('.screen.active').id;
        if(active==='h') renderTable('h');
        if(active==='p') renderTable('p');
        if(document.getElementById('st').classList.contains('active')) renderMonthlyHistoryWithSearch();
        alert("✅ Pembayaran dicatat! Riwayat terupdate.");
    }
    
    function deleteItem(id){
        if(confirm("Hapus data permanen? Semua riwayat pembayaran juga akan hilang.")){
            let db = getData();
            db = db.filter(i=>i.id!==id);
            saveData(db);
            const active = document.querySelector('.screen.active').id;
            if(active==='h') renderTable('h');
            if(active==='p') renderTable('p');
            if(document.getElementById('st').classList.contains('active')) renderMonthlyHistoryWithSearch();
        }
    }
    
    function simpleBackup(){ const db=getData(); if(!db.length) return alert("Tidak ada data"); navigator.clipboard.writeText(JSON.stringify(db)).then(()=>alert("✅ Data (termasuk riwayat) disalin ke clipboard")); }
    function openRestoreModal(){ document.getElementById('restoreTextarea').value=''; document.getElementById('restoreModal').style.display='flex'; }
    function closeRestoreModal(){ document.getElementById('restoreModal').style.display='none'; }
    function executeRestore(){ const raw=document.getElementById('restoreTextarea').value.trim(); if(!raw) return; try{ const parsed=JSON.parse(raw); if(confirm("Ganti semua data?")){ saveData(parsed); alert("Restore berhasil"); closeRestoreModal(); renderTable('h'); renderTable('p'); renderMonthlyHistoryWithSearch(); } }catch(e){ alert("JSON tidak valid"); } }
    
    function buildMonthlyData(){
        const db=getData();
        const map=new Map();
        db.forEach(item=>{
            if(item.r && item.r.length){
                item.r.forEach(p=>{
                    const key = p.t.substring(0,7);
                    if(!map.has(key)) map.set(key,{ hutang:0, piutang:0, total:0, transactions:[] });
                    const g = map.get(key);
                    g.total += p.n;
                    if(item.j==='h') g.hutang += p.n; else g.piutang += p.n;
                    g.transactions.push({ date: p.t, name: item.k, amount: p.n, type: item.j==='h'?'hutang':'piutang', typeLabel: item.j==='h'?'Amanah':'Beri Amanah', desc: p.k });
                });
            }
        });
        const res=[];
        for(let [k,v] of map.entries()){
            const [y,m]=k.split('-');
            res.push({ monthKey: k, monthName: `${bulanIndo[parseInt(m)-1]} ${y}`, ...v });
        }
        return res.sort((a,b)=>b.monthKey.localeCompare(a.monthKey));
    }
    
    function filterMonthlyHistory(){
        const search = document.getElementById('monthSearchInput').value.toLowerCase();
        const activeChip = document.querySelector('.filter-chip.active-filter');
        const activeType = activeChip ? activeChip.getAttribute('data-filter') : 'all';
        let filtered = allRawMonthlyData.map(month=>{
            let filteredTr = month.transactions.filter(tr=>{
                const matchName = tr.name.toLowerCase().includes(search);
                const matchDesc = tr.desc.toLowerCase().includes(search);
                const matchType = (activeType==='all') || (activeType==='hutang' && tr.type==='hutang') || (activeType==='piutang' && tr.type==='piutang');
                return (matchName||matchDesc) && matchType;
            });
            if(filteredTr.length===0) return null;
            let hut=0, piut=0, tot=0;
            filteredTr.forEach(t=>{ tot+=t.amount; if(t.type==='hutang') hut+=t.amount; else piut+=t.amount; });
            return { ...month, transactions: filteredTr, hutang: hut, piutang: piut, total: tot };
        }).filter(m=>m);
        const div = document.getElementById('monthlyHistory');
        if(!filtered.length){ div.innerHTML='<div style="text-align:center; padding:50px; font-size:16px;">🔍 Tidak ada riwayat cocok</div>'; document.getElementById('searchStats').innerText='0 bulan'; return; }
        document.getElementById('searchStats').innerText=`${filtered.length} bulan ditemukan (dari ${allRawMonthlyData.length} total)`;
        div.innerHTML='';
        filtered.forEach(month=>{
            const el = document.createElement('div');
            el.className='month-item';
            el.innerHTML = `<div class="month-title"><span>📅 ${month.monthName}</span><span class="month-badge" style="background:#ede9fe; padding:4px 12px; border-radius:40px;">${month.transactions.length} transaksi</span></div><div class="month-stats-grid"><div class="stat-chip">💰 Total: Rp ${month.total.toLocaleString()}</div><div class="stat-chip">🔻 Amanah: Rp ${month.hutang.toLocaleString()}</div><div class="stat-chip">🔺 Beri Amanah: Rp ${month.piutang.toLocaleString()}</div></div><div style="font-size:14px; margin-top:14px; color:#4b5563;">✨ Klik untuk detail transaksi</div>`;
            el.addEventListener('click',()=>showFilteredMonthDetail(month.monthName, month.transactions));
            div.appendChild(el);
        });
    }
    
    function showFilteredMonthDetail(monthName, transactions){
        document.getElementById('monthModalTitle').innerHTML = `📆 ${monthName}`;
        const cont = document.getElementById('monthDetailContent');
        let html = `<div style="margin-bottom:15px; font-size:14px; background:#f1f5f9; padding:8px; border-radius:20px;">Menampilkan ${transactions.length} pembayaran</div>`;
        transactions.sort((a,b)=>b.date.localeCompare(a.date)).forEach(tr=>{
            html += `<div class="history-detail-item"><div>📆 ${formatTanggalIndonesia(tr.date)}</div><div><strong>${escapeHtml(tr.name)}</strong> <span style="background:#eef2ff; padding:4px 12px; border-radius:20px; font-size:12px;">${tr.typeLabel}</span></div><div>💰 Rp ${tr.amount.toLocaleString()}</div><div style="width:100%; font-size:13px; margin-top:6px;">📝 ${escapeHtml(tr.desc)}</div></div>`;
        });
        cont.innerHTML = html;
        document.getElementById('monthModal').style.display = 'flex';
    }
    
    function renderMonthlyHistoryWithSearch(){ allRawMonthlyData = buildMonthlyData(); filterMonthlyHistory(); }
    function resetMonthlyFilters(){ document.getElementById('monthSearchInput').value=''; document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active-filter')); document.querySelector('.filter-chip[data-filter="all"]').classList.add('active-filter'); filterMonthlyHistory(); }
    function initFilterChips(){ document.querySelectorAll('.filter-chip').forEach(chip=>{ chip.addEventListener('click',()=>{ document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active-filter')); chip.classList.add('active-filter'); filterMonthlyHistory(); }); }); }
    function closeMonthModal(){ document.getElementById('monthModal').style.display='none'; }
    function go(id,btn){
        document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(btn) btn.classList.add('active');
        if(id==='h') renderTable('h');
        if(id==='p') renderTable('p');
        if(id==='st') renderMonthlyHistoryWithSearch();
    }
    
    window.go = go; window.filterTable = filterTable; window.openPay = openPay; window.closePay = closePay; window.savePay = savePay; window.deleteItem = deleteItem; window.simpleBackup = simpleBackup; window.openRestoreModal = openRestoreModal; window.closeRestoreModal = closeRestoreModal; window.executeRestore = executeRestore; window.filterMonthlyHistory = filterMonthlyHistory; window.resetMonthlyFilters = resetMonthlyFilters; window.closeMonthModal = closeMonthModal;
    renderTable('h'); renderTable('p'); renderMonthlyHistoryWithSearch(); initFilterChips();
</script>
</body>
</html>
